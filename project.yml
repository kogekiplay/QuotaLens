name: QuotaLens
options:
  bundleIdPrefix: com.kogeki
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: QuotaLens/App/Info.plist

targets:
  QuotaLens:
    type: application
    platform: iOS
    sources:
      - path: QuotaLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kogeki.QuotaLens
        INFOPLIST_FILE: QuotaLens/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
  QuotaLensTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuotaLensTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kogeki.QuotaLensTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QuotaLens
